<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Happy 17th Birthday, Doaae ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&family=Playfair+Display:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 10% 20%, rgba(255, 200, 210, 0.4), rgba(255, 230, 200, 0.3)),
                        linear-gradient(135deg, #fff5f0 0%, #ffe8e0 100%);
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
            overflow-x: hidden;
        }

        /* animated background particles (soft floating hearts) */
        .floating-heart {
            position: fixed;
            font-size: 1.4rem;
            pointer-events: none;
            opacity: 0.5;
            animation: floatHeart 12s infinite linear;
            z-index: 0;
        }

        @keyframes floatHeart {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% {
                transform: translateY(-20vh) rotate(25deg);
                opacity: 0;
            }
        }

        /* main card */
        .card {
            max-width: 700px;
            width: 100%;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(2px);
            border-radius: 48px;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.15), 0 8px 20px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            position: relative;
            z-index: 2;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: scale(1.01);
        }

        /* decorative top bar */
        .top-bar {
            height: 12px;
            background: linear-gradient(90deg, #f5a3b7, #fbc8b5, #ffe0b5, #f5a3b7);
        }

        /* content */
        .content {
            padding: 40px 32px 48px;
            text-align: center;
        }

        /* name with elegant styling */
        .name {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #c44569, #e76f51, #f4a261);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
            text-shadow: 2px 2px 20px rgba(0,0,0,0.05);
        }

        .age {
            display: inline-block;
            background: #f9e0c7;
            color: #b3413b;
            font-weight: 600;
            font-size: 0.9rem;
            padding: 6px 18px;
            border-radius: 40px;
            letter-spacing: 0.5px;
            margin-bottom: 28px;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.02), 0 2px 5px rgba(0,0,0,0.05);
        }

        /* main birthday greeting */
        .greeting {
            font-size: 2rem;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 24px;
            line-height: 1.3;
        }

        .greeting span {
            background: linear-gradient(120deg, #ffd6b0, #ffe0c0);
            padding: 0 8px;
            border-radius: 20px;
        }

        /* divider with stars */
        .divider {
            margin: 28px 0;
            display: flex;
            justify-content: center;
            gap: 12px;
            color: #f4a261;
            font-size: 1.2rem;
            opacity: 0.7;
        }

        /* love message box (elegant) */
        .love-box {
            background: #fffaf5;
            border-radius: 32px;
            padding: 28px 24px;
            margin: 20px 0 24px;
            border: 1px solid rgba(244, 162, 97, 0.3);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.02);
            transition: all 0.2s;
        }

        .love-message {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            font-weight: 500;
            color: #aa4a3e;
            line-height: 1.5;
        }

        .love-message .big-love {
            font-size: 2rem;
            font-weight: 700;
            color: #d45a4a;
            display: inline-block;
            margin: 8px 0;
        }

        .sorry-line {
            font-family: 'Inter', sans-serif;
            font-size: 1.1rem;
            font-weight: 400;
            color: #7c5e4a;
            margin-top: 16px;
            font-style: italic;
            border-top: 1px dashed #f0cfb0;
            padding-top: 16px;
        }

        /* button / interactive element */
        .candle {
            margin: 25px 0 10px;
            font-size: 2.2rem;
            cursor: pointer;
            transition: 0.2s;
            display: inline-block;
        }

        .candle:active {
            transform: scale(0.9);
        }

        /* subtle footer */
        .footer-note {
            font-size: 0.8rem;
            color: #b98f72;
            margin-top: 32px;
            letter-spacing: 0.3px;
            border-top: 1px solid #ffe0cc;
            padding-top: 24px;
        }

        /* responsive */
        @media (max-width: 550px) {
            .content {
                padding: 32px 20px 40px;
            }
            .name {
                font-size: 2.8rem;
            }
            .greeting {
                font-size: 1.5rem;
            }
            .love-message {
                font-size: 1.3rem;
            }
            .love-message .big-love {
                font-size: 1.6rem;
            }
            .sorry-line {
                font-size: 0.95rem;
            }
        }

        /* micro animation for the love box */
        @keyframes gentlePulse {
            0% { box-shadow: 0 8px 20px rgba(0,0,0,0.02); }
            50% { box-shadow: 0 8px 25px rgba(244, 162, 97, 0.15); }
            100% { box-shadow: 0 8px 20px rgba(0,0,0,0.02); }
        }
        .love-box {
            animation: gentlePulse 3s infinite ease-in-out;
        }
    </style>
</head>
<body>

<!-- floating hearts generated by JS -->
<div id="heartContainer"></div>

<div class="card">
    <div class="top-bar"></div>
    <div class="content">
        <div class="name">Doaae</div>
        <div class="age">✨ 17 years of magic ✨</div>
        
        <div class="greeting">
            <span>🎂 Happy 17th Birthday 🎂</span>
        </div>
        
        <div class="divider">
            <span>✧</span> <span>✦</span> <span>✧</span>
        </div>
        
        <!-- main emotional message -->
        <div class="love-box">
            <div class="love-message">
                <div class="big-love">💖 I love you 💖</div>
                <div>and I’m sorry for anything</div>
                <div>I may have done that hurt you.</div>
                <div class="big-love" style="margin-top: 12px;">💕 I love you so much 💕</div>
            </div>
            <div class="sorry-line">
                — from the bottom of my heart, today and always —
            </div>
        </div>
        
        <!-- interactive candle (just for fun) -->
        <div class="candle" id="wishCandle">
            🕯️ make a wish ✨
        </div>
        
        <div class="footer-note">
            🌟 may your 17th year be filled with light, laughter, and love 🌟
        </div>
    </div>
</div>

<script>
    // create floating hearts in background (professional touch)
    function createFloatingHearts() {
        const container = document.getElementById('heartContainer');
        const hearts = ['❤️', '💖', '💕', '💗', '💓', '🌸', '✨'];
        for (let i = 0; i < 35; i++) {
            const heart = document.createElement('div');
            heart.className = 'floating-heart';
            heart.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];
            const size = 0.8 + Math.random() * 1.2;
            heart.style.fontSize = `${size}rem`;
            heart.style.left = `${Math.random() * 100}%`;
            heart.style.animationDuration = `${8 + Math.random() * 10}s`;
            heart.style.animationDelay = `${Math.random() * 15}s`;
            heart.style.opacity = 0.3 + Math.random() * 0.4;
            container.appendChild(heart);
        }
    }
    
    // candle click effect: show a small alert but gentle
    const candle = document.getElementById('wishCandle');
    candle.addEventListener('click', () => {
        candle.style.transform = 'scale(0.95)';
        candle.innerHTML = '🕯️✨ wish sent to the stars ✨🕯️';
        setTimeout(() => {
            candle.style.transform = '';
            setTimeout(() => {
                candle.innerHTML = '🕯️ make a wish ✨';
            }, 2000);
        }, 300);
    });
    
    createFloatingHearts();
</script>
</body>
</html>
